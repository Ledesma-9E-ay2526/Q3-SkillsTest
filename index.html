<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Skills Test</title>
      <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>
<body>
<div class="header">
    <h1>📝CINE SOPHIA TICKETS</h1>
</div>
<br>
<div class="main">
    <h4>STUDENT DETAILS</h4>
        <label>Full Name:</label>
            <input type="text" placeholder="Ex. Juan Dela Cruz">
    
    <br><br><h4>TICKET SELECTION</h4>
        <label>Quantity (₱250.00 each)</label>
            <input type="number" id="quantity" placeholder="Ex. 3" value="0" min="0">
    
    <br><br><div class="details">
        <h4>PAYMENT DETAILS</h4>
        <hr>

        <div class="row1">
            <label>Subtotal:</label>
                <input type="number" id="subtotal" value="0.00" readonly>
                    
        </div>
<br>
        <div class="row2">
        <label>Admin Fee:</label>
            <input type="number" id="ADMIN_FEE" value="50.00" readonly>
                
        </div>
<hr>
        <div class="row3">
            <h3>TOTAL:</h3>
                <label id="total">0.00</label>
        </div>
    </div>
    <br>
    <button type="button" class="btn btn-primary" onclick="totalCalcu()">Calculate Total</button>
         <button type="button" class="btn btn-primary" onclick="window.location.reload()">Reset</button>
</div>
<script src="main.js"></script>
</body>
</html>
